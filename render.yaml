# Render Blueprint -- lets you deploy this whole app with one click via
# "New +" -> "Blueprint" in the Render dashboard, instead of manually
# configuring a Web Service. Builds from the existing Dockerfile (already
# exposes 8080 with a working healthcheck). All API keys are optional (see
# .env.example) -- `sync: false` means Render prompts for each value in its
# dashboard rather than storing it here, so no secret ever lives in this repo.
services:
  - type: web
    name: threat-intel-dashboard
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/dashboard/health
    envVars:
      - key: PORT
        value: 8080
      - key: NVD_API_KEY
        sync: false
      - key: ABUSECH_AUTH_KEY
        sync: false
      - key: OTX_API_KEY
        sync: false
      - key: ABUSEIPDB_API_KEY
        sync: false
      - key: PULSEDIVE_API_KEY
        sync: false
      - key: PHISHTANK_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: VIRUSTOTAL_API_KEY
        sync: false
      - key: GREYNOISE_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: HYBRID_ANALYSIS_API_KEY
        sync: false
      - key: LEAKIX_API_KEY
        sync: false
